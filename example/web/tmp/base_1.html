<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铁板神数 - 高密度列表</title>
    <style>
        :root {
            --bg: #F8F5F0;
            --ink: #1A1A1B;
            --seal: #A62B1F;
            --age: #967131;
            --line: #D9D4CD;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            padding: 16px;
            font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* 条目容器 */
        .verse-item {
            display: flex;
            align-items: flex-start;
            padding: 14px 0;
            border-bottom: 0.5px solid var(--line);
            gap: 10px;
        }

        /* 算法 Chip：朱砂印章样式 */
        .algo-chip {
            background-color: var(--seal);
            color: #FFFFFF;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 1px;
            white-space: nowrap;
            letter-spacing: 1px;
            box-shadow: 1px 1px 0px rgba(0, 0, 0, 0.1);
            margin-top: 3px;
            flex-shrink: 0;
        }

        /* 年龄格式 (n1, n2) */
        .age-label {
            font-family: "Consolas", "Monaco", monospace;
            font-size: 13px;
            color: var(--age);
            margin-top: 2px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* 无年龄时自动隐藏间距 */
        .age-label:empty {
            display: none;
        }

        /* 条文内容 */
        .verse-content {
            font-size: 17px;
            line-height: 1.6;
            color: var(--ink);
            word-break: break-all;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="verse-item">
            <div class="algo-chip">太玄</div>
            <div class="age-label">(28, 37)</div>
            <div class="verse-content">命有定数，运有变数。知命而改运，方为上乘。</div>
        </div>

        <div class="verse-item">
            <div class="algo-chip">元堂</div>
            <div class="age-label"></div>
            <div class="verse-content">金石为开，大器晚成。宜守不宜进，静待春风至。</div>
        </div>

        <div class="verse-item">
            <div class="algo-chip">八卦</div>
            <div class="age-label">(45, 54)</div>
            <div class="verse-content">枯木逢春再发芽，几番风雨又生辉。</div>
        </div>
    </div>
</body>

</html>
