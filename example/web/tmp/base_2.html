<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铁板神数 - 意境长卷</title>
    <style>
        :root {
            --bg-paper: #F2EFE8;
            /* 仿古宣纸 */
            --ink-deep: #1A1A1B;
            /* 浓墨 */
            --ink-wash: #D1CDC2;
            /* 淡墨 */
            --seal-red: #A62B1F;
            /* 朱砂 */
            --age-gold: #967131;
            /* 枯金 */
            --divider: rgba(26, 26, 27, 0.08);
        }

        body {
            background-color: var(--bg-paper);
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            /* 纸张纹理 */
            color: var(--ink-deep);
            margin: 0;
            font-family: "Noto Serif SC", "STSong", serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 区域一：全景导览 (算法矩阵) --- */
        .nav-matrix {
            padding: 15px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 2px solid var(--ink-deep);
            background: rgba(255, 255, 255, 0.3);
            white-space: nowrap;
        }

        .algo-stamp {
            display: inline-block;
            border: 1.5px solid var(--seal-red);
            color: var(--seal-red);
            padding: 2px 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }

        .algo-stamp:hover {
            background: var(--seal-red);
            color: white;
        }

        /* --- 区域二：主轴条文区 (高密度) --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--ink-wash) transparent;
        }

        .verse-section-title {
            border-left: 4px solid var(--ink-deep);
            padding-left: 10px;
            margin: 20px 0 10px 0;
            font-size: 14px;
            color: var(--ink-wash);
            letter-spacing: 2px;
        }

        .verse-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1px;
            background-color: var(--divider);
            /* 用背景色做格线 */
        }

        .verse-item {
            background: var(--bg-paper);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            transition: transform 0.2s;
        }

        .verse-item:hover {
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transform: scale(1.02);
        }

        /* 设计感 Chip */
        .verse-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chip-seal {
            background-color: var(--seal-red);
            color: white;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 0;
            box-shadow: 1px 1px 0px #4d1510;
        }

        .age-bracket {
            font-family: "JetBrains Mono", monospace;
            font-size: 12px;
            color: var(--age-gold);
            font-weight: bold;
        }

        .verse-text {
            font-size: 17px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        /* --- 区域三：底部详情预览 (及说明) --- */
        .footer-status {
            height: 40px;
            background: var(--ink-deep);
            color: var(--bg-paper);
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 12px;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <div class="nav-matrix">
        <div class="algo-stamp">太玄</div>
        <div class="algo-stamp">元堂</div>
        <div class="algo-stamp">日柱</div>
        <div class="algo-stamp">四柱</div>
        <div class="algo-stamp">生命卦</div>
        <div class="algo-stamp">八卦</div>
        <div class="algo-stamp">先后天</div>
        <div class="algo-stamp">六爻</div>
    </div>

    <div class="main-content">

        <div class="verse-section-title">太玄推演结果 (24条)</div>
        <div class="verse-grid">
            <div class="verse-item">
                <div class="verse-header">
                    <span class="chip-seal">太玄</span>
                    <span class="age-bracket">(28, 37)</span>
                </div>
                <div class="verse-text">命有定数，运有变数。知命而改运，方为上乘。</div>
            </div>

            <div class="verse-item">
                <div class="verse-header">
                    <span class="chip-seal">太玄</span>
                    <span class="age-bracket"></span>
                </div>
                <div class="verse-text">金石为开，大器晚成。宜守不宜进。</div>
            </div>
        </div>

        <div class="verse-section-title">元堂大运流年 (128条)</div>
        <div class="verse-grid">
            <div class="verse-item">
                <div class="verse-header">
                    <span class="chip-seal">元堂</span>
                    <span class="age-bracket">(45, 54)</span>
                </div>
                <div class="verse-text">石中藏美玉，淘沙见真金。此十年间，财禄自丰。</div>
            </div>
        </div>

    </div>

    <div class="footer-status">
        <span>当前排盘：乙巳年 庚辰月 ...</span>
        <span>共计推演条文：428 条</span>
    </div>

</body>

</html>
